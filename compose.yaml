version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: conacy-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-testneo4j}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "127.0.0.1:7474:7474"  # HTTP Neo4j Browser (Local only)
      - "127.0.0.1:7687:7687"  # Bolt protocol (Local only)
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - conacy-network

  redis:
    image: redis:alpine
    container_name: conacy-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - conacy-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${SERVER_BUILD_TARGET:-runner}
    container_name: conacy-server
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-testneo4j}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - jwksUri=${JWKS_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PRIVATE_KEY=${PRIVATE_KEY}
      - PUBLIC_KEY=${PUBLIC_KEY}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - neo4j
      - redis
    networks:
      - conacy-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: ${CLIENT_BUILD_TARGET:-runner}
      args:
        - VITE_SERVER_URL=${VITE_SERVER_URL:-}
        - VITE_WS=${VITE_WS:-}
    container_name: conacy-client
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_SERVER_URL=${VITE_SERVER_URL:-}
      - VITE_WS=${VITE_WS:-}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - conacy-network

  nginx:
    image: nginx:alpine
    container_name: conacy-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - conacy-network

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:

networks:
  conacy-network:
    driver: bridge
